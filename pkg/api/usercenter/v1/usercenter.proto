syntax = "proto3";

package usercenter.v1;

option go_package = "github.com/rosas99/monster/pkg/api/usercenter/v1";

service UserCenter {
    rpc Authorize(LoginRequest2) returns (LoginResponse2) {
    }
}

message LoginRequest2 {
  string username = 1;
  string password = 2;
}

message LoginResponse2 {
  string token = 1;
}

